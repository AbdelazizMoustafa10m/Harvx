[package]
name = "my-project"
version = "0.1.0"
edition = "2021"
description = "A sample Rust project for testing TOML compression"
license = "MIT"
readme = "README.md"

# Build configuration
[profile.release]
opt-level = 3
lto = true
strip = true

[dependencies]
serde = { version = "1.0", features = ["derive"] }
tokio = { version = "1.35", features = ["full"] }
axum = "0.7"
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "postgres", "migrate", "uuid", "chrono"] }
tracing = "0.1"
tracing-subscriber = "0.3"
anyhow = "1.0"
thiserror = "1.0"
uuid = { version = "1.6", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
config = "0.14"
dotenvy = "0.15"

[dev-dependencies]
tokio-test = "0.4"
pretty_assertions = "1.4"
mockall = "0.12"

[[bin]]
name = "server"
path = "src/main.rs"

[[example]]
name = "basic"
path = "examples/basic.rs"