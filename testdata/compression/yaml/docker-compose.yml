# Docker Compose configuration
version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://user:pass@db:5432/mydb
      - REDIS_URL=redis://cache:6379
      - API_KEY=sk-test-key-placeholder
      - SECRET_TOKEN=abc123
      - LOG_LEVEL=info
      - MAX_CONNECTIONS=100
      - TIMEOUT=30000
    depends_on:
      - db
      - cache
    volumes:
      - ./src:/app/src
      - node_modules:/app/node_modules
    networks:
      - backend

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
  node_modules:

networks:
  backend:
    driver: bridge